<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" width="640" height="340" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="640" height="340" fill="#f8f9fa" rx="12"/>

  <!-- Title -->
  <text x="320" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#222">OneWheel Riding Positions</text>

  <!-- Divider -->
  <line x1="320" y1="45" x2="320" y2="310" stroke="#ccc" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- ===== LEFT: SAFE CROUCH POSITION ===== -->
  <text x="160" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#2a7a2a">✓ Safe: Crouched Stance</text>

  <!-- Ground line left -->
  <line x1="60" y1="270" x2="260" y2="270" stroke="#888" stroke-width="1.5"/>

  <!-- OneWheel board left -->
  <rect x="100" y="252" width="120" height="14" rx="4" fill="#333"/>
  <!-- Wheel left -->
  <ellipse cx="160" cy="266" rx="22" ry="22" fill="none" stroke="#555" stroke-width="5"/>
  <ellipse cx="160" cy="266" rx="10" ry="10" fill="#555"/>

  <!-- Rider (crouched) - stick figure -->
  <!-- Feet on board -->
  <line x1="130" y1="252" x2="120" y2="240" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="190" y1="252" x2="200" y2="240" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Lower legs (bent knees) -->
  <line x1="120" y1="240" x2="135" y2="218" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="200" y1="240" x2="185" y2="218" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Upper legs -->
  <line x1="135" y1="218" x2="155" y2="210" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="185" y1="218" x2="165" y2="210" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso (upright over board) -->
  <line x1="160" y1="210" x2="160" y2="175" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Arms out for balance -->
  <line x1="160" y1="185" x2="130" y2="198" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <line x1="160" y1="185" x2="190" y2="198" stroke="#2a7a2a" stroke-width="3" stroke-linecap="round"/>
  <!-- Head -->
  <circle cx="160" cy="165" r="12" fill="none" stroke="#2a7a2a" stroke-width="3"/>

  <!-- Center-of-gravity marker (safe: above wheel) -->
  <line x1="160" y1="145" x2="160" y2="158" stroke="#2a7a2a" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="160,135 155,148 165,148" fill="#2a7a2a"/>
  <text x="160" y="128" text-anchor="middle" font-size="10" fill="#2a7a2a">CoG above wheel</text>

  <!-- Direction arrow left -->
  <defs>
    <marker id="arrowL" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2a7a2a"/>
    </marker>
  </defs>
  <line x1="68" y1="260" x2="95" y2="260" stroke="#2a7a2a" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="68" y="275" font-size="10" fill="#2a7a2a">travel</text>

  <!-- Label: reduced drag note -->
  <text x="160" y="295" text-anchor="middle" font-size="11" fill="#2a7a2a">Lower stance reduces drag</text>
  <text x="160" y="310" text-anchor="middle" font-size="11" fill="#2a7a2a">and increases speed safely</text>

  <!-- ===== RIGHT: UNSAFE LEANING POSITION ===== -->
  <text x="480" y="62" text-anchor="middle" font-size="13" font-weight="bold" fill="#b22222">✗ Unsafe: Forward Lean</text>

  <!-- Ground line right -->
  <line x1="380" y1="270" x2="580" y2="270" stroke="#888" stroke-width="1.5"/>

  <!-- OneWheel board right -->
  <rect x="420" y="252" width="120" height="14" rx="4" fill="#333"/>
  <!-- Wheel right -->
  <ellipse cx="480" cy="266" rx="22" ry="22" fill="none" stroke="#555" stroke-width="5"/>
  <ellipse cx="480" cy="266" rx="10" ry="10" fill="#555"/>

  <!-- Rider (leaning forward dangerously) - stick figure -->
  <!-- Feet on board -->
  <line x1="450" y1="252" x2="440" y2="240" stroke="#b22222" stroke-width="3" stroke-linecap="round"/>
  <line x1="510" y1="252" x2="500" y2="240" stroke="#b22222" stroke-width="3" stroke-linecap="round"/>
  <!-- Legs (straighter) -->
  <line x1="440" y1="240" x2="445" y2="215" stroke="#b22222" stroke-width="3" stroke-linecap="round"/>
  <line x1="500" y1="240" x2="495" y2="215" stroke="#b22222" stroke-width="3" stroke-linecap="round"/>
  <!-- Hips -->
  <line x1="445" y1="215" x2="495" y2="215" stroke="#b22222" stroke-width="3" stroke-linecap="round"/>
  <!-- Torso (leaning forward, past wheel) -->
  <line x1="470" y1="215" x2="450" y2="175" stroke="#b22222" stroke-width="3" stroke-linecap="round"/>
  <!-- Arms forward -->
  <line x1="453" y1="192" x2="430" y2="200" stroke="#b22222" stroke-width="3" stroke-linecap="round"/>
  <line x1="453" y1="192" x2="472" y2="205" stroke="#b22222" stroke-width="3" stroke-linecap="round"/>
  <!-- Head (forward of wheel) -->
  <circle cx="444" cy="163" r="12" fill="none" stroke="#b22222" stroke-width="3"/>

  <!-- Center-of-gravity marker (unsafe: ahead of wheel) -->
  <line x1="432" y1="145" x2="440" y2="153" stroke="#b22222" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="427,135 422,148 432,148" fill="#b22222"/>
  <text x="414" y="128" text-anchor="middle" font-size="10" fill="#b22222">CoG ahead of wheel</text>

  <!-- Warning symbol -->
  <text x="540" y="145" font-size="26" fill="#b22222">⚠</text>

  <!-- Direction arrow right -->
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#b22222"/>
    </marker>
  </defs>
  <line x1="388" y1="260" x2="415" y2="260" stroke="#b22222" stroke-width="2" marker-end="url(#arrowR)"/>
  <text x="388" y="275" font-size="10" fill="#b22222">travel</text>

  <!-- Label: nosedive risk note -->
  <text x="480" y="295" text-anchor="middle" font-size="11" fill="#b22222">CoG in front of wheel risks</text>
  <text x="480" y="310" text-anchor="middle" font-size="11" fill="#b22222">nosedive and loss of control</text>
</svg>
